<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronunciation Proficiency Test - HB Recording</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS Client via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="glass-container">
        <header>
            <h1 class="premium-title">Pronunciation Proficiency Test</h1>
            <p class="subtitle">HB Recording System</p>
        </header>

        <main>
            <section class="input-group">
                <label for="student-id">受講生番号</label>
                <input type="text" id="student-id" placeholder="例: ST12345" required>
            </section>

            <section id="task-section" class="task-section hidden">
                <div class="task-header">
                    <h2>今日の課題フレーズ</h2>
                    <span id="phrase-counter" class="phrase-counter">1 / 5</span>
                </div>
                <div class="phrase-card">
                    <p id="phrase-text">Loading...</p>
                </div>
            </section>

            <section class="recorder-section">
                <div class="visualizer-container">
                    <canvas id="visualizer"></canvas>
                    <div id="status-badge" class="badge ready">Ready</div>
                </div>

                <div class="controls">
                    <button id="record-btn" class="btn-record">
                        <span class="icon"></span>
                        <span class="text">REC開始</span>
                    </button>
                </div>
            </section>

            <section id="preview-section" class="preview-section hidden">
                <h3>録音内容の確認</h3>
                <audio id="audio-player" controls></audio>
                <div class="preview-controls">
                    <button id="retry-btn" class="btn-secondary">撮り直す</button>
                    <button id="upload-btn" class="btn-primary">これで保存する</button>
                </div>
            </section>

            <section id="status-message" class="status-message hidden">
                <!-- Status content dynamically inserted -->
            </section>
        </main>

        <footer>
            <p>&copy;Link Academy Inc. ALL Rights Reserved.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
